name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main, staging, develop, "refactor/**"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, types, and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff lint
        run: python -m ruff check src tests conftest.py
      - name: Mypy
        run: python -m mypy src
      - name: Compile Python sources
        run: python -m compileall -q src
      - name: Pytest
        run: python -m pytest -q --junitxml=test-results.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-test-results
          path: backend/test-results.xml
          if-no-files-found: error
          retention-days: 14

  container:
    name: Build API container
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build without publishing
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: lawrence-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
