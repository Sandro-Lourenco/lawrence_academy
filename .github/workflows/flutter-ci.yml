name: Flutter CI

on:
  pull_request:
    paths:
      - "lawrence/**"
      - ".github/workflows/flutter-ci.yml"
  push:
    branches: [main, staging, develop, "refactor/**"]
    paths:
      - "lawrence/**"
      - ".github/workflows/flutter-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.0"
  TEST_DEFINES: >-
    --dart-define=ENV=dev
    --dart-define=SUPABASE_URL=https://mock.supabase.co
    --dart-define=SUPABASE_ANON_KEY=mock-anon-key
    --dart-define=API_BASE_URL=http://localhost:8000/api/v1

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lawrence
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Analyze
        run: flutter analyze --no-pub
      - name: Test
        run: flutter test --no-pub $TEST_DEFINES

  web-build:
    name: Web smoke build
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lawrence
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - name: Build web without production credentials
        run: flutter build web --release $TEST_DEFINES

  android-build:
    name: Android app bundle smoke build
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lawrence
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - name: Build unsigned verification bundle
        run: flutter build appbundle --release $TEST_DEFINES
